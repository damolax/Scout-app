services:
  - type: worker
    name: scout-background-worker
    env: node
    plan: starter
    buildCommand: npm install --no-audit --no-fund
    startCommand: node scripts/render-worker.mjs
    autoDeploy: true
    envVars:
      - key: SCOUT_APP_URL
        sync: false
      - key: SCOUT_WORKSPACE_ID
        value: 00000000-0000-4000-8000-000000000001
      - key: RUN_ALL_WORKER_SECRET
        sync: false
      - key: WORKER_INTERVAL_MINUTES
        value: "15"
      - key: WORKER_REPLY_DAYS
        value: "90"
      - key: WORKER_REPLY_LIMIT
        value: "500"
      - key: WORKER_SCHEDULE_LIMIT
        value: "3"
      - key: WORKER_AUTO_SCOUT_CYCLES
        value: "5"
      - key: WORKER_AUTO_SCOUT_BATCH_SIZE
        value: "100"
      - key: WORKER_AUTO_SCOUT_CONCURRENCY
        value: "12"
      - key: WORKER_AUTO_SCOUT_ENQUEUE_LIMIT
        value: "2500"
